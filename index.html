<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Decision Machine</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle at top,#111,#000);
font-family:Segoe UI;
color:white;
overflow:hidden;
}

.container{
text-align:center;
}

h1{
font-weight:300;
letter-spacing:3px;
margin-bottom:10px;
}

.pick{
opacity:.7;
margin-bottom:40px;
}

.hand{
font-size:150px;
cursor:pointer;
animation:float 2.5s ease-in-out infinite;
transition:.3s;
}

.hand:hover{
transform:scale(1.1);
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-15px)}
100%{transform:translateY(0)}
}

.thinking{
display:none;
font-size:22px;
opacity:.8;
animation:fade 1s ease;
}

.loader{
margin-top:20px;
width:40px;
height:40px;
border:4px solid #ffffff20;
border-top:4px solid white;
border-radius:50%;
animation:spin 1s linear infinite;
margin-left:auto;
margin-right:auto;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

.reveal{
display:none;
text-align:center;
animation:pop .6s ease;
}

.reveal h2{
font-size:34px;
max-width:650px;
margin:auto;
}

button{
margin-top:30px;
padding:12px 32px;
background:#ffffff10;
border:1px solid #ffffff20;
border-radius:25px;
color:white;
cursor:pointer;
font-size:14px;
transition:.3s;
}

button:hover{
background:#ffffff25;
}

.finalText{
opacity:0;
margin-top:30px;
font-size:36px;
letter-spacing:3px;
transition:opacity 1s ease;
}

.show{
opacity:1;
}

@keyframes pop{
from{opacity:0; transform:scale(.8)}
to{opacity:1; transform:scale(1)}
}

@keyframes fade{
from{opacity:0}
to{opacity:1}
}

.glow{
position:absolute;
width:300px;
height:300px;
background:radial-gradient(circle,rgba(255,255,255,.15),transparent 70%);
filter:blur(60px);
animation:move 10s linear infinite;
}

.glow:nth-child(2){
animation-duration:14s;
}

@keyframes move{
0%{transform:translate(-40vw,-40vh)}
50%{transform:translate(40vw,30vh)}
100%{transform:translate(-40vw,-40vh)}
}

</style>
</head>

<body>

<div class="glow"></div>
<div class="glow"></div>

<div class="container" id="game">

<h1>WHAT SHOULD I DO RN??</h1>
<div class="pick">Pick a finger ✨</div>

<div class="hand" onclick="choose()">✌🏻</div>

</div>


<div class="container thinking" id="thinking">

<div>OR KINNII VAARI TRY KREGI🤦‍♂️...</div>
<div class="loader"></div>

</div>


<div class="reveal" id="result">

<h2 id="message"></h2>

<button id="actionBtn" onclick="action()">Try Again</button>

<div class="finalText" id="finalText">
WWOHOOOOOO 😋😋😋
</div>

</div>

<script>

let attempt = 0
let busy = false

const messages = [
"OOOOO INSTA SCROLL OKAAA",
"YOU REALLY THINK IM GONNA STUDYYY??? ME SCROLLING INSTA ONLY",
"WANNA TRY AGAIN AABABABAB 🤣",
"CMONN ABTO EVN YOU ARE IMPRESSED OF THIS HEHEHE",
"BASSS CODE ENDS HEREE ITNAA TIME NI THA MERE PAAS SCROLL KRNE DO"
]

const loadingTexts = [
"HMMMMM LEMMEEE SEEE WHT YOU PICKEDD.....",
"AGAINNNN HMMM, LEMMEE SEEE.......",
"DUMBOOOO YOU ARE.......",
"AGAINNNNNNNN??........",
"KRRRR DIYAA NA CWAZZYYY 😆😆....."
]

function choose(){

if(busy) return
busy = true

document.getElementById("game").style.display="none"
document.getElementById("thinking").style.display="block"

document.querySelector("#thinking div").innerText = loadingTexts[attempt]

setTimeout(()=>{

document.getElementById("thinking").style.display="none"
document.getElementById("result").style.display="block"

document.getElementById("message").innerText = messages[attempt]

if(attempt >= 4){
document.getElementById("actionBtn").innerText="OHKAYY"
}

busy = false

},1500)

}

function action(){

if(busy) return
busy = true

if(attempt < 4){

attempt++

document.getElementById("result").style.display="none"
document.getElementById("game").style.display="block"

setTimeout(()=>{ busy=false },200)

}else{

document.getElementById("actionBtn").style.display="none"
document.getElementById("finalText").classList.add("show")

busy=false

}

}

</script>

</body>
</html>
