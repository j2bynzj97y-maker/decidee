<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Decision Maker</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle at top,#141414,#000);
font-family:Segoe UI;
color:white;
overflow:hidden;
}

.container{
text-align:center;
}

h1{
font-weight:300;
letter-spacing:3px;
margin-bottom:10px;
}

.pick{
opacity:.7;
margin-bottom:40px;
}

.hand{
font-size:150px;
cursor:pointer;
animation:float 2.5s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-15px)}
100%{transform:translateY(0)}
}

.reveal{
display:none;
text-align:center;
animation:fade 0.8s ease;
}

.reveal h2{
font-size:34px;
max-width:600px;
margin:auto;
}

.retry{
margin-top:30px;
padding:12px 30px;
background:#ffffff10;
border:1px solid #ffffff20;
border-radius:25px;
color:white;
cursor:pointer;
font-size:14px;
transition:.3s;
}

.retry:hover{
background:#ffffff25;
}

.finalText{
opacity:0;
margin-top:30px;
font-size:28px;
transition:opacity 1s ease;
}

.show{
opacity:1;
}

@keyframes fade{
from{opacity:0; transform:scale(.85)}
to{opacity:1; transform:scale(1)}
}

</style>
</head>

<body>

<div class="container" id="game">

<h1>WHAT SHOULD I DO RN??</h1>
<div class="pick">Pick a finger ✨</div>

<div class="hand" onclick="choose()">✌🏻</div>

</div>


<div class="reveal" id="result">

<h2 id="message">OOOOO INSTA SCROLL OKAAA</h2>

<button class="retry" id="retryBtn" onclick="next()">Try Again</button>

<div class="finalText" id="finalText">
WWOHOOOOOO 😋😋😋
</div>

</div>


<script>

let attempt = 0

const messages = [
"OOOOO INSTA SCROLL OKAAA",
"YOU REALLY THINK IM GONNA STUDYYY??? ME SCROLLING INSTA ONLY",
"WANNA TRY AGAIN AABABABAB 🤣",
"CMONN ABTO EVN YOU ARE IMPRESSED OF THIS HEHEHE",
"BASSS CODE ENDS HEREE ITNAA TIME NI THA MERE PAAS SCROLL KRNE DO"
]

function choose(){
document.getElementById("game").style.display="none"
document.getElementById("result").style.display="block"
document.getElementById("message").innerText = messages[0]
attempt = 1
}

function next(){

if(attempt < messages.length){
document.getElementById("message").innerText = messages[attempt]
attempt++
}

if(attempt === messages.length){
document.getElementById("retryBtn").innerText = "OHKAYY"
}

if(attempt > messages.length){
document.getElementById("retryBtn").style.display="none"
document.getElementById("finalText").classList.add("show")
}

}

</script>

</body>
</html>
